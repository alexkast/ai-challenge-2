# .github/dependabot.yml

version: 2
updates:
  # npm dependencies in task-1/
  - package-ecosystem: npm
    directory: /task-1
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - task-1

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
